schema: spec-driven

context: |
  Tech stack: Python 3.12+, PyScript (runs in browser via Pyodide/Emscripten)
  Frontend framework: WebComPy — component-based, reactive, SPA
  Server: Starlette + uvicorn (dev server, SSG)
  Package manager: uv
  Conventions: conventional commits, type annotations throughout, no comments unless requested

  ## Known Issues (to be resolved in future changes)

  ### Signal System
  - No element-level reactivity in ReactiveList/ReactiveDict — any mutation triggers full change notification (ReactiveList now exposes _last_mutation metadata for incremental consumers)
  - __purge_signal_members__ in SignalReceivable properly calls consumer_destroy() for cleanup

  ### Component System
  - Component IDs are MD5 hashes — not collision-proof

  ### Element System
  - No virtual DOM diffing — direct DOM manipulation only
  - SwitchElement completely regenerates children on change (RepeatElement now supports key-based reconciliation)
  - TextElement does not hydrate pre-rendered text nodes (always creates new text node)

  ### Router
  - Multiple global singletons (Router, RouterView) make testing require explicit cleanup
  - Location popstate proxy must be manually destroy()ed

  ### Async
  - AsyncComputed.value is T | None — no way to distinguish "not yet resolved" from "resolved to None" without checking done flag
  - AsyncComputed._error sets _done = False on error, conflating error state with pending state

  ### General
  - Multiple global singletons (Router, RouterView, ComponentStore, Component._head_props)
  - Browser detection is binary (Emscripten vs other) — no partial API availability checks
  - No provide/inject (DI) system (noted in README ToDo)
  - No plugin system (noted in README ToDo)

# Per-artifact rules (optional)
rules:
  proposal:
    - Always include a "Known Issues Addressed" section when a change relates to any known issue
    - Always include a "Non-goals" section
  tasks:
    - Break tasks into chunks of max 2 hours
