[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "webcompy-testing"
version = "0.0.13"
description = "WebComPy testing utilities (TestRenderer, fake ports, ASGI test client)"
license = "MIT"
requires-python = ">=3.12"
authors = [
    { name = "Kento Niwase", email = "kento.niwase@gmail.com" },
]
keywords = ["browser", "frontend", "testing"]
classifiers = [
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "webcompy",
    "webcompy-server",
    "starlette",
    "beautifulsoup4",
]

[project.urls]
Homepage = "https://github.com/kniwase/WebComPy"

[tool.hatch.build.targets.wheel]
packages = ["src/webcompy_testing"]
