[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "webcompy"
version = "0.0.13"
description = "Python frontend framework which works on Browser"
readme = "../../README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [
    { name = "Kento Niwase", email = "kento.niwase@gmail.com" },
]
keywords = ["browser", "frontend", "framework", "front-end", "client-side"]
classifiers = [
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

[project.urls]
Homepage = "https://github.com/kniwase/WebComPy"

[project.optional-dependencies]
server = ["webcompy-server"]
cli = ["webcompy-cli"]
testing = ["webcompy-testing"]
full = ["webcompy-server", "webcompy-cli", "webcompy-testing"]

[tool.hatch.build.targets.wheel]
packages = ["src/webcompy"]

[tool.hatch.build.targets.wheel.shared-data]

[tool.hatch.build]
exclude = ["docs_app", "docs", "template"]
