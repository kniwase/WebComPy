name: CI
run-name: "Review #${{ github.event.pull_request.number }}"

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

jobs:
  detect-scope:
    runs-on: ubuntu-latest
    outputs:
      has-code-changes: ${{ steps.check.outputs.has-code-changes }}
      has-generate-changes: ${{ steps.check.outputs.has-generate-changes }}
      has-e2e-changes: ${{ steps.check.outputs.has-e2e-changes }}
      has-workflow-changes: ${{ steps.check.outputs.has-workflow-changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD)
          CODE=$(echo "$CHANGED" | grep -E '^(packages/|pyproject\.toml|uv\.lock)' || true)
          echo "has-code-changes=$([ -n "$CODE" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          GENERATE=$(echo "$CHANGED" | grep -E '^(packages/|docs_app/|pyproject\.toml)' || true)
          echo "has-generate-changes=$([ -n "$GENERATE" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          E2E=$(echo "$CHANGED" | grep -E '^(tests/|scripts/run-e2e-tests\.sh)' || true)
          echo "has-e2e-changes=$([ -n "$E2E" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          WORKFLOW=$(echo "$CHANGED" | grep -E '^\.github/workflows/' || true)
          echo "has-workflow-changes=$([ -n "$WORKFLOW" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  openspec:
    if: github.event_name != 'pull_request' || github.event.action == 'ready_for_review' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx @fission-ai/openspec@latest validate --specs
      - run: npx @fission-ai/openspec@latest validate --changes

  openspec-check:
    if: github.event_name != 'pull_request' || github.event.action == 'ready_for_review' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Detect completed but unarchived changes
        run: |
          changes_json=$(npx @fission-ai/openspec@latest list --json 2>/dev/null)
          complete_names=$(echo "$changes_json" | jq -r '.changes[] | select(.status == "complete") | .name')
          if [ -n "$complete_names" ]; then
            echo "::error::Completed changes must be archived before merging to main. Run /opsx-archive for:"
            echo "$complete_names" | while read -r name; do
              echo "::error::  - $name (all tasks complete, not yet archived)"
            done
            exit 1
          fi
          in_progress_names=$(echo "$changes_json" | jq -r '.changes[] | select(.status == "in-progress") | .name')
          if [ -n "$in_progress_names" ]; then
            echo "::notice::In-progress changes found. These are expected on feature branches and do not need archiving until implementation is complete:"
            echo "$in_progress_names" | while read -r name; do
              echo "::notice::  - $name"
            done
          fi
      - name: Validate change naming conventions
        run: |
          valid_prefix="^(feat|fix|refactor|docs|chore|test|perf)-"
          for dir in openspec/changes/*/; do
            name=$(basename "$dir")
            [ "$name" = "archive" ] && continue
            if ! echo "$name" | grep -qE "$valid_prefix"; then
              echo "::error::Change '$name' does not follow naming convention (<type>-<description>). Expected prefix: feat-, fix-, refactor-, docs-, chore-, test-, perf-"
              exit 1
            fi
          done

  lint:
    needs: [detect-scope]
    if: ${{ (needs.detect-scope.outputs.has-code-changes == 'true' || needs.detect-scope.outputs.has-generate-changes == 'true' || needs.detect-scope.outputs.has-workflow-changes == 'true') && (github.event_name != 'pull_request' || github.event.action == 'ready_for_review' || !github.event.pull_request.draft) }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-environment
      - name: Run ruff check
        run: |
          uv run ruff check . 2>&1 | tee ci-lint-ruff.log
          exit "${PIPESTATUS[0]}"
      - name: Run ruff format check
        run: |
          uv run ruff format --check . 2>&1 | tee ci-lint-format.log
          exit "${PIPESTATUS[0]}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-lint-logs
          path: |
            ci-lint-ruff.log
            ci-lint-format.log

  typecheck:
    needs: [detect-scope]
    if: ${{ needs.detect-scope.outputs.has-code-changes == 'true' && (github.event_name != 'pull_request' || github.event.action == 'ready_for_review' || !github.event.pull_request.draft) }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-environment
      - name: Run pyright
        run: |
          uv run pyright 2>&1 | tee ci-typecheck-pyright.log
          exit "${PIPESTATUS[0]}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-typecheck-logs
          path: ci-typecheck-pyright.log

  generate:
    needs: [detect-scope]
    if: ${{ (needs.detect-scope.outputs.has-code-changes == 'true' || needs.detect-scope.outputs.has-generate-changes == 'true') && (github.event_name != 'pull_request' || github.event.action == 'ready_for_review' || !github.event.pull_request.draft) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-environment
        with:
          uv-sync-args: --all-groups
      - run: uv run python -m webcompy generate --config docs_app.webcompy_config
      - uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: docs_app/dist/
          if-no-files-found: error

  test:
    needs: [detect-scope]
    if: ${{ needs.detect-scope.outputs.has-code-changes == 'true' && (github.event_name != 'pull_request' || github.event.action == 'ready_for_review' || !github.event.pull_request.draft) }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-environment
        with:
          uv-sync-args: --all-groups
      - name: Run unit tests
        run: |
          uv run python -m pytest tests/ --tb=short --ignore=tests/e2e --ignore=tests/e2e_docs --cov=webcompy --cov=webcompy_server --cov=webcompy_cli --cov=webcompy_testing --cov-report=xml --cov-report=term-missing 2>&1 | tee ci-test-results.log
          exit "${PIPESTATUS[0]}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-test-logs
          path: ci-test-results.log

  e2e-matrix:
    if: ${{ (needs.detect-scope.outputs.has-code-changes == 'true' || needs.detect-scope.outputs.has-e2e-changes == 'true') && !failure() && !cancelled() && (github.event_name != 'pull_request' || github.event.action == 'ready_for_review' || !github.event.pull_request.draft) }}
    needs: [detect-scope, lint, typecheck, generate, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -eo pipefail {0}
    strategy:
      fail-fast: false
      matrix:
        group:
          - name: bootstrap-static
            files: tests/e2e/test_bootstrap.py tests/e2e/test_static_site.py
          - name: components
            files: tests/e2e/test_component.py tests/e2e/test_lifecycle.py tests/e2e/test_scoped_style.py
          - name: reactive-lists
            files: tests/e2e/test_reactive.py tests/e2e/test_repeat.py tests/e2e/test_keyed_repeat.py tests/e2e/test_dict_repeat.py
          - name: dynamic-control
            files: tests/e2e/test_nested_dynamic.py tests/e2e/test_switch.py
          - name: router
            files: tests/e2e/test_router.py tests/e2e/test_async_nav.py
          - name: interaction
            files: tests/e2e/test_event.py tests/e2e/test_di.py
          - name: bundled-deps
            files: tests/e2e/test_bundled_deps.py tests/e2e/test_bundled_deps_browser.py
          - name: runtime-local
            files: tests/e2e/test_runtime_local.py
          - name: standalone
            files: tests/e2e/test_standalone.py
          - name: plugin-script
            files: tests/e2e/test_eruda.py
        serving_mode: [prod, static]
        include:
          - group:
              name: docs-home
              files: tests/e2e_docs/test_home.py tests/e2e_docs/test_documents.py tests/e2e_docs/test_helloworld.py
            serving_mode: static
          - group:
              name: docs-demos
              files: tests/e2e_docs/test_fizzbuzz.py tests/e2e_docs/test_todo.py
            serving_mode: static
          - group:
              name: docs-matplotlib
              files: tests/e2e_docs/test_matplotlib.py
            serving_mode: static
          - group:
              name: docs-fetch
              files: tests/e2e_docs/test_fetch.py
            serving_mode: static
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-environment
        with:
          uv-sync-args: "--group docs"
          playwright-install: "true"
      - name: Download docs dist artifact
        if: startsWith(matrix.group.name, 'docs-')
        uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: docs_app/dist/
      - name: Run E2E tests
        env:
          DOCS_DIST_DIR: ${{ github.workspace }}/docs_app/dist
        run: |
          scripts/run-e2e-tests.sh ${{ matrix.group.name }} --serving-mode=${{ matrix.serving_mode }} 2>&1 | tee ci-e2e-results.log
          exit "${PIPESTATUS[0]}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-server-log-${{ matrix.group.name }}-${{ matrix.serving_mode }}
          path: |
            tests/e2e/.e2e-server.log
            tests/e2e_docs/.e2e-docs-server.log
            .tmp/e2e-test-corpus/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-e2e-log-${{ matrix.group.name }}-${{ matrix.serving_mode }}
          path: ci-e2e-results.log

  review:
    name: AI Code Review
    if: ${{ always() && !failure() && !cancelled() && (github.event_name != 'pull_request' || github.event.action == 'ready_for_review' || !github.event.pull_request.draft) }}
    needs: [detect-scope, openspec, openspec-check, lint, typecheck, generate, test, e2e-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write  # required for POST/PATCH to /issues/{number}/comments via gh api
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          cache: true

      - run: uv sync --dev --no-group docs

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install OpenSpec CLI so the review agent can use it.
      # Validation is already performed by the openspec/openspec-check jobs.
      # Must not block the review job if install fails (use || true).
      - run: npm install -g @fission-ai/openspec@latest || true

      - name: Download CI result artifacts
        uses: actions/download-artifact@v4
        with:
          path: ci-results/
          pattern: ci-*

      - name: Generate CI results summary
        id: ci-summary
        run: |
          # Check job statuses from GitHub API
          LINT_STATUS="${{ needs.lint.result }}"
          TYPECHECK_STATUS="${{ needs.typecheck.result }}"
          TEST_STATUS="${{ needs.test.result }}"
          E2E_STATUS="${{ needs.e2e-matrix.result }}"
          GENERATE_STATUS="${{ needs.generate.result }}"

          # Build summary table
          echo "## CI Results" > ci_summary_comment.md
          echo "" >> ci_summary_comment.md
          echo "| Check | Status |" >> ci_summary_comment.md
          echo "|-------|--------|" >> ci_summary_comment.md

          # Lint
          if [ "$LINT_STATUS" = "success" ]; then
            echo "| Lint (ruff check + format) | ✅ Passed |" >> ci_summary_comment.md
          elif [ "$LINT_STATUS" = "failure" ]; then
            echo "| Lint (ruff check + format) | ❌ Failed |" >> ci_summary_comment.md
          else
            echo "| Lint (ruff check + format) | ⚠️ $LINT_STATUS |" >> ci_summary_comment.md
          fi

          # TypeCheck
          if [ "$TYPECHECK_STATUS" = "success" ]; then
            echo "| TypeCheck (pyright) | ✅ Passed |" >> ci_summary_comment.md
          elif [ "$TYPECHECK_STATUS" = "failure" ]; then
            echo "| TypeCheck (pyright) | ❌ Failed |" >> ci_summary_comment.md
          else
            echo "| TypeCheck (pyright) | ⚠️ $TYPECHECK_STATUS |" >> ci_summary_comment.md
          fi

          # Generate
          if [ "$GENERATE_STATUS" = "success" ]; then
            echo "| Generate (SSG) | ✅ Passed |" >> ci_summary_comment.md
          elif [ "$GENERATE_STATUS" = "failure" ]; then
            echo "| Generate (SSG) | ❌ Failed |" >> ci_summary_comment.md
          else
            echo "| Generate (SSG) | ⚠️ $GENERATE_STATUS |" >> ci_summary_comment.md
          fi

          # Test
          if [ "$TEST_STATUS" = "success" ]; then
            echo "| Unit Tests (pytest) | ✅ Passed |" >> ci_summary_comment.md
          elif [ "$TEST_STATUS" = "failure" ]; then
            echo "| Unit Tests (pytest) | ❌ Failed |" >> ci_summary_comment.md
          else
            echo "| Unit Tests (pytest) | ⚠️ $TEST_STATUS |" >> ci_summary_comment.md
          fi

          # E2E
          if [ "$E2E_STATUS" = "success" ]; then
            echo "| E2E Tests (Playwright) | ✅ Passed |" >> ci_summary_comment.md
          elif [ "$E2E_STATUS" = "failure" ]; then
            echo "| E2E Tests (Playwright) | ❌ Failed |" >> ci_summary_comment.md
          else
            echo "| E2E Tests (Playwright) | ⚠️ $E2E_STATUS |" >> ci_summary_comment.md
          fi

          # Add failure details in collapsible sections
          echo "" >> ci_summary_comment.md

          add_failure_details() {
            local log_file="$1"
            local step_name="$2"
            if [ -f "$log_file" ]; then
              local content
              content=$(tail -c 30000 "$log_file" 2>/dev/null || cat "$log_file")
              echo "<details><summary>❌ $step_name — Failure Details</summary>" >> ci_summary_comment.md
              echo "" >> ci_summary_comment.md
              echo '```' >> ci_summary_comment.md
              echo "$content" >> ci_summary_comment.md
              echo '```' >> ci_summary_comment.md
              echo "" >> ci_summary_comment.md
              echo "</details>" >> ci_summary_comment.md
              echo "" >> ci_summary_comment.md
            fi
          }

          # Lint details
          if [ "$LINT_STATUS" = "failure" ]; then
            for f in ci-results/ci-lint-logs/*.log; do
              add_failure_details "$f" "Lint"
            done
          fi

          # TypeCheck details
          if [ "$TYPECHECK_STATUS" = "failure" ]; then
            for f in ci-results/ci-typecheck-logs/*.log; do
              add_failure_details "$f" "TypeCheck"
            done
          fi

          # Test details
          if [ "$TEST_STATUS" = "failure" ]; then
            for f in ci-results/ci-test-logs/*.log; do
              add_failure_details "$f" "Unit Tests"
            done
          fi

          # E2E details
          if [ "$E2E_STATUS" = "failure" ]; then
            for f in ci-results/ci-e2e-log-*/ci-e2e-results.log; do
              add_failure_details "$f" "E2E Tests"
            done
          fi

          # Build prompt context
          echo "CI_RESULTS<<CI_RESULTS_EOF" >> "$GITHUB_ENV"
          echo "CI Results (already verified by CI pipeline — do NOT re-verify):" >> "$GITHUB_ENV"
          echo "" >> "$GITHUB_ENV"
          echo "- Lint (ruff check + format): $LINT_STATUS" >> "$GITHUB_ENV"
          echo "- TypeCheck (pyright): $TYPECHECK_STATUS" >> "$GITHUB_ENV"
          echo "- Generate (SSG): $GENERATE_STATUS" >> "$GITHUB_ENV"
          echo "- Unit Tests (pytest): $TEST_STATUS" >> "$GITHUB_ENV"
          echo "- E2E Tests (Playwright): $E2E_STATUS" >> "$GITHUB_ENV"
          echo "" >> "$GITHUB_ENV"

          # Add detailed logs for failures only (truncated to 30KB)
          append_log() {
            local log_file="$1"
            local label="$2"
            if [ -f "$log_file" ]; then
              echo "--- $label ---" >> "$GITHUB_ENV"
              tail -c 30000 "$log_file" >> "$GITHUB_ENV" 2>/dev/null || cat "$log_file" >> "$GITHUB_ENV"
              echo "" >> "$GITHUB_ENV"
            fi
          }
          if [ "$LINT_STATUS" = "failure" ]; then
            for f in ci-results/ci-lint-logs/*.log; do
              append_log "$f" "Lint: $(basename "$f")"
            done
          fi
          if [ "$TYPECHECK_STATUS" = "failure" ]; then
            for f in ci-results/ci-typecheck-logs/*.log; do
              append_log "$f" "TypeCheck: $(basename "$f")"
            done
          fi
          if [ "$TEST_STATUS" = "failure" ]; then
            for f in ci-results/ci-test-logs/*.log; do
              append_log "$f" "Unit Tests: $(basename "$f")"
            done
          fi
          if [ "$E2E_STATUS" = "failure" ]; then
            for f in ci-results/ci-e2e-log-*/ci-e2e-results.log; do
              append_log "$f" "E2E: $(basename "$(dirname "$f")")"
            done
          fi

          echo "CI_RESULTS_EOF" >> "$GITHUB_ENV"

          # Determine overall status
          ALL_PASSED=true
          [ "$LINT_STATUS" != "success" ] && ALL_PASSED=false
          [ "$TYPECHECK_STATUS" != "success" ] && ALL_PASSED=false
          [ "$GENERATE_STATUS" != "success" ] && ALL_PASSED=false
          [ "$TEST_STATUS" != "success" ] && ALL_PASSED=false
          [ "$E2E_STATUS" != "success" ] && ALL_PASSED=false

          if [ "$ALL_PASSED" = true ]; then
            echo "" >> ci_summary_comment.md
            echo "All checks passed! ✅" >> ci_summary_comment.md
          fi

          echo "Summary comment:"
          cat ci_summary_comment.md

      - name: Post CI results summary comment
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          COMMENT_BODY=$(cat ci_summary_comment.md)
          # Find and update existing CI results comment, or create new one
          EXISTING_ID=$(gh api repos/$REPO/issues/$PR_NUMBER/comments \
            --jq '[.[] | select(.user.login == "github-actions[bot]") | select(.body | test("## CI Results")) | .id] | last // empty' 2>/dev/null || echo "")
          
          if [ -n "$EXISTING_ID" ]; then
            gh api repos/$REPO/issues/comments/$EXISTING_ID \
              --method PATCH \
              --field body="$COMMENT_BODY" \
              --silent
          else
            gh api repos/$REPO/issues/$PR_NUMBER/comments \
              --method POST \
              --field body="$COMMENT_BODY" \
              --silent
          fi
          rm -f ci_summary_comment.md

      - name: Ensure clean working tree
        run: git checkout -- . && git clean -fd

      - name: Install OpenCode
        run: npm install -g opencode-ai@v1.16.2

      - name: Ensure scratch directory exists
        run: mkdir -p .tmp

      - name: Fetch PR context
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          PR_DATA=$(gh api "repos/$REPO/pulls/$PR_NUMBER")
          TITLE=$(echo "$PR_DATA" | jq -r '.title')
          BODY=$(echo "$PR_DATA" | jq -r '.body // ""')
          {
            echo "## PR #${PR_NUMBER}: ${TITLE}"
            echo ""
            echo "### Description"
            echo ""
            echo "${BODY}"
            echo ""
            echo "### Human Comments"
            echo ""
            gh api "repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
              --jq '.[] | select(.user.type != "Bot") | "**@\(.user.login)**: \(.body)\n"'
          } > .tmp/pr-context.txt

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr diff $PR_NUMBER \
            | awk '/^diff --git /{in_skip=0} /^diff --git .*(uv\.lock|package-lock\.json)$/{in_skip=1} !in_skip' \
            > .tmp/pr-diff.txt

      - name: Write scope context
        id: scope-context
        run: |
          if [ "${{ needs.detect-scope.outputs.has-code-changes }}" = "false" ] && \
             [ "${{ needs.detect-scope.outputs.has-generate-changes }}" = "false" ] && \
             [ "${{ needs.detect-scope.outputs.has-e2e-changes }}" = "false" ] && \
             [ "${{ needs.detect-scope.outputs.has-workflow-changes }}" = "false" ]; then
            {
              echo "This PR contains only documentation or OpenSpec artifacts."
              echo "No code, generate, E2E, or workflow changes are included."
              echo "Focus review on:"
              if echo "${{ github.event.pull_request.title }}" | grep -qi "openspec"; then
                echo "- Design correctness and completeness"
                echo "- Spec consistency with existing specs"
                echo "- Task clarity and feasibility"
                echo "- Non-goals vs scope alignment"
              else
                echo "- Documentation accuracy and clarity"
                echo "- Consistency with existing docs"
              fi
            } > .tmp/scope-context.txt
          else
            {
              echo "Code-change PR — standard code review."
              echo ""
              echo "Changed scopes:"
              [ "${{ needs.detect-scope.outputs.has-code-changes }}" = "true" ] && echo "- Code (packages/ + deps)"
              [ "${{ needs.detect-scope.outputs.has-generate-changes }}" = "true" ] && echo "- Generate (docs_app/)"
              [ "${{ needs.detect-scope.outputs.has-e2e-changes }}" = "true" ] && echo "- E2E (tests/ + scripts)"
              [ "${{ needs.detect-scope.outputs.has-workflow-changes }}" = "true" ] && echo "- Workflow (.github/workflows/)"
            } > .tmp/scope-context.txt
          fi

      - name: Write CI results to file
        env:
          CI_RESULTS: ${{ env.CI_RESULTS }}
        run: |
          if [ -z "$CI_RESULTS" ]; then
            echo "No CI results available (pipeline passed with no failures)." > .tmp/ci-results.txt
          else
            printf '%s\n' "$CI_RESULTS" > .tmp/ci-results.txt
          fi

      - name: Fetch incremental diff since last review
        id: inc-diff
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          REVIEWED_AT_COMMENT=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            --jq '[.[] | select(.user.login == "github-actions[bot]") | select(.body | test("REVIEWED_AT:"))] | last.body // empty')
          LAST_SHA=$(echo "$REVIEWED_AT_COMMENT" | sed -n 's/.*REVIEWED_AT: \([a-f0-9]\{40\}\).*/\1/p' | head -1)
          if [ -n "$LAST_SHA" ] && git cat-file -e "$LAST_SHA" 2>/dev/null; then
            if git merge-base --is-ancestor "$LAST_SHA" HEAD 2>/dev/null; then
              git diff "$LAST_SHA"..HEAD -- ':!uv.lock' ':!package-lock.json' > .tmp/pr-diff-since-last.txt
              echo "Incremental diff generated from $LAST_SHA"
            else
              echo "# Incremental diff unavailable: branch was rebased or merged with main since last review." > .tmp/pr-diff-since-last.txt
              echo "# Full PR diff is attached separately as .tmp/pr-diff.txt." >> .tmp/pr-diff-since-last.txt
              echo "Incremental diff skipped — $LAST_SHA is not an ancestor of HEAD"
            fi
          else
            echo "# No REVIEWED_AT marker found in previous bot comments." > .tmp/pr-diff-since-last.txt
          fi

      - name: Run OpenCode Review
        id: opencode-review
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENCODE_CONFIG_CONTENT: ${{ secrets.OPENCODE_CONFIG_CONTENT }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_API_URL: ${{ secrets.OPENCODE_API_URL }}
          OPENCODE_MODEL: ${{ secrets.OPENCODE_MODEL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -eo pipefail

          MAX_ATTEMPTS=2
          attempt=0
          PROMPT="Review this pull request as a WebComPy-specialized reviewer. Three context files are attached:
          - .tmp/pr-diff.txt — full diff against the merge base (lockfiles excluded)
          - .tmp/pr-diff-since-last.txt — incremental diff since the last CI review (or a note if unavailable)
          - .tmp/pr-context.txt — PR title, description, and human comments for context
          CI results have already been verified by the CI pipeline — read .tmp/ci-results.txt for the full results.
          Trust these CI results and only review for issues that CI cannot catch (logic bugs, design issues, missing edge cases, spec violations).

          SPEC-DRIVEN REVIEW: Classify changed files by subsystem and read the corresponding \`openspec/specs/\` before reviewing. Always start with \`openspec/specs/overview/spec.md\` and \`openspec/specs/architecture/spec.md\`. Then read subsystem specs as specified in your agent configuration. Use specs as a checklist — verify no \"SHALL\" requirement is violated.

          .tmp/ and .workspace/ are your scratch workspace — you may write files there for intermediate work.

          When you have completed your review, write ONLY the final review to .tmp/review-output.md.
          Follow the review template format specified in your agent configuration.
          Do NOT write your research process, tool calls, or file reads — only the final review.

          IMPORTANT — Template rules:
          - The \`💡 Change Summary\` section SHALL only appear when the verdict is \`approved\`.
          - When the verdict is \`changes_requested\`, omit the \`💡 Change Summary\` section entirely.
          - With \`changes_requested\`, the section order is: Summary of Changes → Overall Assessment → What's Good → Action Items → Verdict

          After writing, re-read .tmp/review-output.md and self-review your review:
          - Verify all claims are backed by the actual diff
          - Check for formatting issues, typos, or unclear language
          - Confirm the \`<!-- REVIEW_RESULT: ... -->\` marker is present and correct
          - If you find any issues, rewrite the file with corrections

          CRITICAL — OUTPUT INSTRUCTIONS (read twice):
          Your review is NOT complete until you have called the Write tool
          to save your final review to .tmp/review-output.md.
          Writing to stdout is NOT sufficient — the file MUST exist on disk.
          If .tmp/review-output.md does not exist when you finish, your work
          will be discarded and the review step will fail.

          STEP-BY-STEP:
          1. Analyze the diff and write your review
          2. Call Write tool: filePath=.tmp/review-output.md, content=<your review>
          3. Call Read tool on .tmp/review-output.md to verify it was written correctly
          4. Confirm the last line matches \`<!-- REVIEW_RESULT: approved -->\` or \`<!-- REVIEW_RESULT: changes_requested -->\`
          5. Only then are you truly done — do not stop before step 4"

           _review_ok() {
             [ -s .tmp/review-output.md ] || return 1
             local last
             last=$(grep -v '^[[:space:]]*$' .tmp/review-output.md | tail -n 1)
             [ "$last" = "<!-- REVIEW_RESULT: approved -->" ] || [ "$last" = "<!-- REVIEW_RESULT: changes_requested -->" ]
           }

           while [ $attempt -lt $MAX_ATTEMPTS ]; do
             attempt=$((attempt + 1))

             RETRY_MSG=""
              FILES=(--file .tmp/pr-diff.txt --file .tmp/pr-diff-since-last.txt --file .tmp/pr-context.txt --file .tmp/ci-results.txt --file .tmp/scope-context.txt)
             if [ $attempt -gt 1 ]; then
               FILES+=(--file .tmp/review-raw-output.log)
               RETRY_MSG="

          RETRY ATTEMPT: The previous run completed without writing .tmp/review-output.md.
          Your analysis from the previous attempt is in .tmp/review-raw-output.log — recover it.
          You MUST use the Write tool to write ONLY the final review to .tmp/review-output.md."
            fi

            opencode run \
              --agent ci-review \
              "${FILES[@]}" \
              --title "PR #$PR_NUMBER Review" \
              "$PROMPT$RETRY_MSG" \
              2>&1 | tee .tmp/review-raw-output.log || true

            if _review_ok; then
              echo "::notice::Review output written on attempt $attempt"
              break
            fi

            echo "::warning::Attempt $attempt: review-output.md missing or lacks REVIEW_RESULT marker"
          done

          if ! _review_ok; then
            echo "::error::All $MAX_ATTEMPTS attempts failed to produce valid review output"
            exit 1
          fi

      - name: Output review summary
        if: always() && steps.opencode-review.outcome != 'cancelled'
        run: |
          if [ -s .tmp/review-output.md ]; then
            {
              echo "## AI Code Review"
              echo ""
              cat .tmp/review-output.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post review output as comment
        if: always() && steps.opencode-review.outcome != 'cancelled'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -eo pipefail
          if [ ! -s .tmp/review-output.md ]; then
            echo "Review output is empty, skipping comment post."
            exit 0
          fi

          SHA=$(git rev-parse HEAD)
          REVIEW_RESULT=$(grep -oP '<!-- REVIEW_RESULT: \K(approved|changes_requested)' .tmp/review-output.md | head -1)
          REVIEW_RESULT=${REVIEW_RESULT:-unknown}

          # Extract sections from review-output.md
          extract() {
            awk -v s="$1" '
              $0 ~ "^### " { flag = ($0 ~ "^### .*" s "$") ? 1 : 0; next }
              flag && $0 !~ "^---$" { print }
            ' .tmp/review-output.md
          }

          extract_bullets() {
            awk -v s="$1" '
              $0 ~ "^### " { flag = ($0 ~ "^### .*" s "$") ? 1 : 0; next }
              flag && /^- / { print }
            ' .tmp/review-output.md
          }

          SUMMARY=$(extract "Summary of Changes")
          ASSESSMENT=$(extract "Overall Assessment")
          WHATSGOOD_HEADING=$(extract_bullets "What's Good")
          ACTIONS_HEADING=$(extract_bullets "Action Items")
          ACTIONS_FULL=$(extract "Action Items")
          CHANGE_SUMMARY=$(extract "Change Summary")
          VERDICT=$(extract "Verdict")

          # Build digest body based on result
          build_digest() {
            local result="$1"
            : > .tmp/digest-body.txt
            if [ "$result" = "approved" ]; then
              printf '%s\n' "## 🟢 Code Review: Approved" >> .tmp/digest-body.txt
              printf '%s\n' "" >> .tmp/digest-body.txt
              printf '%s\n' "📊 [Full review output]($SUMMARY_URL)" >> .tmp/digest-body.txt
              printf '%s\n' "" >> .tmp/digest-body.txt
              if [ -n "$SUMMARY" ]; then
                printf '%s\n' "### 📋 Summary of Changes" >> .tmp/digest-body.txt
                printf '%s\n' "$SUMMARY" >> .tmp/digest-body.txt
                printf '%s\n' "" >> .tmp/digest-body.txt
              fi
              if [ -n "$ASSESSMENT" ]; then
                printf '%s\n' "### 💬 Overall Assessment" >> .tmp/digest-body.txt
                printf '%s\n' "$ASSESSMENT" >> .tmp/digest-body.txt
                printf '%s\n' "" >> .tmp/digest-body.txt
              fi
              if [ -n "$WHATSGOOD_HEADING" ]; then
                printf '%s\n' "### 🟢 What's Good" >> .tmp/digest-body.txt
                printf '%s\n' "$WHATSGOOD_HEADING" >> .tmp/digest-body.txt
              fi
              if [ -n "$ACTIONS_HEADING" ]; then
                printf '%s\n' "" >> .tmp/digest-body.txt
                printf '%s\n' "### 📌 Action Items" >> .tmp/digest-body.txt
                printf '%s\n' "$ACTIONS_HEADING" >> .tmp/digest-body.txt
              fi
              if [ -n "$CHANGE_SUMMARY" ]; then
                printf '%s\n' "" >> .tmp/digest-body.txt
                printf '%s\n' "### 💡 Change Summary" >> .tmp/digest-body.txt
                printf '%s\n' "$CHANGE_SUMMARY" >> .tmp/digest-body.txt
              fi
              if [ -n "$VERDICT" ]; then
                printf '%s\n' "" >> .tmp/digest-body.txt
                printf '%s\n' "### ✅ Verdict" >> .tmp/digest-body.txt
                printf '%s\n' "$VERDICT" >> .tmp/digest-body.txt
              fi
            elif [ "$result" = "changes_requested" ]; then
              printf '%s\n' "## 🟡 Code Review: Changes Requested" >> .tmp/digest-body.txt
              printf '%s\n' "" >> .tmp/digest-body.txt
              printf '%s\n' "📊 [Full review output]($SUMMARY_URL)" >> .tmp/digest-body.txt
              printf '%s\n' "" >> .tmp/digest-body.txt
              if [ -n "$SUMMARY" ]; then
                printf '%s\n' "### 📋 Summary of Changes" >> .tmp/digest-body.txt
                printf '%s\n' "$SUMMARY" >> .tmp/digest-body.txt
                printf '%s\n' "" >> .tmp/digest-body.txt
              fi
              if [ -n "$ASSESSMENT" ]; then
                printf '%s\n' "### 💬 Overall Assessment" >> .tmp/digest-body.txt
                printf '%s\n' "$ASSESSMENT" >> .tmp/digest-body.txt
                printf '%s\n' "" >> .tmp/digest-body.txt
              fi
              if [ -n "$ACTIONS_FULL" ]; then
                printf '%s\n' "### 📌 Action Items" >> .tmp/digest-body.txt
                printf '%s\n' "$ACTIONS_FULL" >> .tmp/digest-body.txt
              fi
              if [ -n "$VERDICT" ]; then
                printf '%s\n' "" >> .tmp/digest-body.txt
                printf '%s\n' "### ✅ Verdict" >> .tmp/digest-body.txt
                printf '%s\n' "$VERDICT" >> .tmp/digest-body.txt
              fi
            else
              cp .tmp/review-output.md .tmp/digest-body.txt
            fi
          }

          SUMMARY_URL="https://github.com/$REPO/actions/runs/$RUN_ID?pr=$PR_NUMBER"
          build_digest "$REVIEW_RESULT"

          # Handle history accumulation
          EXISTING_COMMENT=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            --jq '[.[] | select(.user.login == "github-actions[bot]") | select(.body | test("REVIEW_RESULT:")) | {id: .id, body: .body}] | last // empty')
          EXISTING_ID=$(echo "$EXISTING_COMMENT" | jq -r '.id // empty')

          if [ -n "$EXISTING_ID" ]; then
            OLD_BODY=$(echo "$EXISTING_COMMENT" | jq -r '.body')
            OLD_SHA=$(echo "$OLD_BODY" | sed -n 's/.*REVIEWED_AT: \([a-f0-9]\{40\}\).*/\1/p' | head -1)
            OLD_RESULT=$(echo "$OLD_BODY" | grep -oP '<!-- REVIEW_RESULT: \K(approved|changes_requested)' | tail -1)
            OLD_BADGE="🟡 Changes requested"
            [ "$OLD_RESULT" = "approved" ] && OLD_BADGE="🟢 Approved"
            OLD_URL="https://github.com/$REPO/pull/$PR_NUMBER#issuecomment-$EXISTING_ID"

            # Extract previous history from old comment to carry forward
            PREV_HISTORY=$(echo "$OLD_BODY" | awk '/^### Review History/{found=1; next} found && /^<!-- /{exit} found{print}')
            NEW_ENTRY="- ${OLD_SHA:0:8} — ${OLD_BADGE} [Review digest](${OLD_URL})"

            if [ -n "$PREV_HISTORY" ]; then
              HISTORY_SECTION="${NEW_ENTRY}"$'\n'"${PREV_HISTORY}"
            else
              HISTORY_SECTION="${NEW_ENTRY}"
            fi

            # Fold old comment into <details> (skip if already folded)
            if echo "$OLD_BODY" | grep -q '^<details>'; then
              FOLDED_BODY="$OLD_BODY"
            else
              OLD_BODY_ESCAPED=$(echo "$OLD_BODY" | sed 's|</details>|\&lt;/details&gt;|g')
              FOLDED_BODY="<details><summary>Review history (${OLD_BADGE})</summary>

            ${OLD_BODY_ESCAPED}

            </details>"
            fi
            echo "$FOLDED_BODY" | jq -Rs '{body: .}' \
              | gh api "repos/$REPO/issues/comments/$EXISTING_ID" \
                --method PATCH \
                --input - \
                --silent

            printf '\n\n### Review History\n%s' "$HISTORY_SECTION" >> .tmp/digest-body.txt
          fi

          # Append markers (must be end of file)
          printf '<!-- REVIEW_RESULT: %s -->\n<!-- REVIEWED_AT: %s -->' "$REVIEW_RESULT" "$SHA" >> .tmp/digest-body.txt

          # Post digest comment and capture ID
          COMMENT_ID=$(cat .tmp/digest-body.txt \
            | jq -Rs --argjson limit 60000 \
              '{body: (. | if length > $limit then .[:$limit] + "\n\n[truncated]" else . end)}' \
            | gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
              --method POST \
              --input - \
              --jq '.id')
          echo "COMMENT_ID=$COMMENT_ID" >> "$GITHUB_ENV"

      - name: Submit PR review based on result
        if: always() && steps.opencode-review.outcome != 'cancelled'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REVIEW_OUTCOME: ${{ steps.opencode-review.outcome }}
        run: |
          COMMENT_ID="${COMMENT_ID:-}"
          if [ -z "$COMMENT_ID" ]; then
            COMMENT_ID=$(gh api repos/$REPO/issues/$PR_NUMBER/comments \
              --jq '[.[] | select(.user.login == "github-actions[bot]") | select(.body | test("REVIEW_RESULT:")) | .id] | last // empty')
          fi

          if [ -z "$COMMENT_ID" ]; then
            if [ "$REVIEW_OUTCOME" = "failure" ]; then
              echo "::warning::OpenCode review step encountered an infrastructure error"
              gh pr review $PR_NUMBER --comment --body "CI review step encountered an error and could not complete. Please re-run the CI workflow."
            else
              echo "::warning::No review result marker found in comments, requesting changes as safety default"
              gh pr review $PR_NUMBER --request-changes --body "OpenCode review result could not be determined. Please review manually."
              echo "::error::Review result undetermined - merge blocked as safety default"
              exit 1
            fi
          fi

          COMMENT_BODY=$(gh api repos/$REPO/issues/comments/$COMMENT_ID --jq '.body')
          DIGEST_LINK="📋 [Review digest](https://github.com/$REPO/pull/$PR_NUMBER#issuecomment-$COMMENT_ID)"

          NEW_RESULT=$(echo "$COMMENT_BODY" | grep -oP '<!-- REVIEW_RESULT: \K(approved|changes_requested)' | tail -1)
          if [ "$NEW_RESULT" = "changes_requested" ]; then
            BODY_CHANGES="## 🟡 Code Review: Changes Requested"
            gh pr review $PR_NUMBER --request-changes --body "$(printf '%s\n' "$BODY_CHANGES" '' "${DIGEST_LINK}" '' 'OpenCode review identified issues that should be addressed before merging.')"
            echo "::error::Review requests changes - merge blocked"
            exit 1
          else
            BODY_APPROVED="## 🟢 Code Review: Approved"
            gh pr review $PR_NUMBER --approve --body "$(printf '%s\n' "$BODY_APPROVED" '' "${DIGEST_LINK}" '' 'OpenCode review completed, no blocking issues found.')"
          fi
