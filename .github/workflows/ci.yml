name: CI

on:
  pull_request:
    branches: [main]

jobs:
  openspec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx @fission-ai/openspec@latest validate --specs
      - run: npx @fission-ai/openspec@latest validate --changes

  openspec-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Detect completed but unarchived changes
        run: |
          changes_json=$(npx @fission-ai/openspec@latest list --json 2>/dev/null)
          complete_names=$(echo "$changes_json" | jq -r '.changes[] | select(.status == "complete") | .name')
          if [ -n "$complete_names" ]; then
            echo "::error::Completed changes must be archived before merging to main. Run /opsx-archive for:"
            echo "$complete_names" | while read -r name; do
              echo "::error::  - $name (all tasks complete, not yet archived)"
            done
            exit 1
          fi
          in_progress_names=$(echo "$changes_json" | jq -r '.changes[] | select(.status == "in-progress") | .name')
          if [ -n "$in_progress_names" ]; then
            echo "::notice::In-progress changes found. These are expected on feature branches and do not need archiving until implementation is complete:"
            echo "$in_progress_names" | while read -r name; do
              echo "::notice::  - $name"
            done
          fi
      - name: Validate change naming conventions
        run: |
          valid_prefix="^(feat|fix|refactor|docs|chore|test|perf)-"
          for dir in openspec/changes/*/; do
            name=$(basename "$dir")
            [ "$name" = "archive" ] && continue
            if ! echo "$name" | grep -qE "$valid_prefix"; then
              echo "::error::Change '$name' does not follow naming convention (<type>-<description>). Expected prefix: feat-, fix-, refactor-, docs-, chore-, test-, perf-"
              exit 1
            fi
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-environment
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-environment
      - run: uv run pyright

  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-environment
        with:
          uv-sync-args: --all-groups
      - run: uv run python -m webcompy generate --app docs_app.bootstrap:app
      - uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: docs/
          if-no-files-found: error

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-environment
      - run: uv run python -m pytest tests/ --tb=short --ignore=tests/e2e --ignore=tests/e2e_docs --cov=webcompy --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  e2e-matrix:
    if: ${{ !failure() && !cancelled() }}
    needs: [lint, typecheck, generate, test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - name: bootstrap-static
            files: tests/e2e/test_bootstrap.py tests/e2e/test_static_site.py
          - name: components
            files: tests/e2e/test_component.py tests/e2e/test_lifecycle.py tests/e2e/test_scoped_style.py
          - name: reactive-lists
            files: tests/e2e/test_reactive.py tests/e2e/test_repeat.py tests/e2e/test_keyed_repeat.py tests/e2e/test_dict_repeat.py
          - name: dynamic-control
            files: tests/e2e/test_nested_dynamic.py tests/e2e/test_switch.py
          - name: router
            files: tests/e2e/test_router.py tests/e2e/test_async_nav.py
          - name: interaction
            files: tests/e2e/test_event.py tests/e2e/test_di.py
          - name: bundled-deps
            files: tests/e2e/test_bundled_deps.py tests/e2e/test_bundled_deps_browser.py
          - name: runtime-local
            files: tests/e2e/test_runtime_local.py
          - name: standalone
            files: tests/e2e/test_standalone.py
        serving_mode: [prod, static]
        include:
          - group:
              name: docs-home
              files: tests/e2e_docs/test_home.py tests/e2e_docs/test_documents.py tests/e2e_docs/test_helloworld.py
            serving_mode: static
          - group:
              name: docs-demos
              files: tests/e2e_docs/test_fizzbuzz.py tests/e2e_docs/test_todo.py
            serving_mode: static
          - group:
              name: docs-matplotlib
              files: tests/e2e_docs/test_matplotlib.py
            serving_mode: static
          - group:
              name: docs-fetch
              files: tests/e2e_docs/test_fetch.py
            serving_mode: static
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-environment
        with:
          uv-sync-args: "--group docs"
          playwright-install: "true"
      - name: Download docs dist artifact
        if: startsWith(matrix.group.name, 'docs-')
        uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: docs/
      - name: Run E2E tests
        run: uv run python -m pytest ${{ matrix.group.files }} --tb=short --serving-mode=${{ matrix.serving_mode }}
        env:
          DOCS_DIST_DIR: ${{ github.workspace }}/docs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-server-log-${{ matrix.group.name }}-${{ matrix.serving_mode }}
          path: |
            tests/e2e/.e2e-server.log
            tests/e2e_docs/.e2e-docs-server.log

  review:
    if: always()
    needs: [openspec, openspec-check, lint, typecheck, generate, test, e2e-matrix]
    runs-on: ubuntu-latest
    concurrency:
      group: review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run OpenCode Review
        id: opencode-review
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_COMPAT_API_KEY: ${{ secrets.OPENAI_COMPAT_API_KEY }}
          OPENAI_COMPAT_BASE_URL: ${{ secrets.OPENAI_COMPAT_BASE_URL }}
          OPENAI_COMPAT_MODEL: ${{ secrets.OPENAI_COMPAT_MODEL }}
        with:
          model: openai-compat/${{ secrets.OPENAI_COMPAT_MODEL }}
          use_github_token: true
          prompt: |
            Review this pull request. Follow these rules strictly:

            1. Check previous review comments on this PR first. Do NOT repeat points that have already been raised and addressed. Do NOT re-raise issues that were already approved in a previous review round.

            2. Focus ONLY on the code diff (the changes in this PR). Do not review code that was not changed.

            3. If you are re-reviewing after changes were pushed, only review the NEW changes since the last review. Skip anything that was already reviewed and approved.

            4. Check for code quality issues, potential bugs, and suggest improvements — but only for the changed code.

            5. Refer to the results of the CI checks (lint, typecheck, generate, test, e2e) that ran before this review.

            6. If the PR diff includes changes under `openspec/changes/archive/`, read the corresponding Change artifacts (proposal.md, design.md, tasks.md, and specs/) and verify that the implementation correctly satisfies ALL requirements defined in those specs. Pay special attention to the Acceptance Criteria in tasks.md. If any requirement or acceptance criterion is not met, request changes and explain which spec/criterion is violated.

            7. You MUST output `REVIEW_RESULT: changes_requested` if there are ANY issues or suggestions — no matter how minor. Only output `REVIEW_RESULT: approved` when there are ZERO issues to raise. This includes cosmetic issues, nits, naming conventions, missing tests, unclear variable names, etc. When in doubt, request changes.

            At the end of your review, include EXACTLY ONE of these lines:
            REVIEW_RESULT: approved
            or
            REVIEW_RESULT: changes_requested

      - name: Submit PR review based on result
        if: always() && steps.opencode-review.outcome != 'cancelled'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          COMMENT_ID=$(gh api repos/$REPO/issues/$PR_NUMBER/comments \
            --jq '[.[] | select(.user.login == "github-actions[bot]") | select(.body | test("REVIEW_RESULT:")) | .id] | last // empty')

          if [ -z "$COMMENT_ID" ]; then
            echo "::warning::No review result marker found in comments, requesting changes as safety default"
            gh pr review $PR_NUMBER --request-changes --body "OpenCode review result could not be determined. Please review manually."
            echo "::error::Review result undetermined - merge blocked as safety default"
            exit 1
          fi

          COMMENT_BODY=$(gh api repos/$REPO/issues/comments/$COMMENT_ID --jq '.body')

          if echo "$COMMENT_BODY" | grep -q "REVIEW_RESULT: changes_requested"; then
            gh pr review $PR_NUMBER --request-changes --body "OpenCode review found issues that should be addressed before merging."
            echo "::error::Review requests changes - merge blocked"
            exit 1
          else
            gh pr review $PR_NUMBER --approve --body "OpenCode review completed, no blocking issues found."
          fi
